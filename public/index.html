<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #007cd1;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Social Media</h2>
    <input type="text" id="username" placeholder="Enter Username">
    <button onclick="login()">Continue</button>
</div>

<script>
function login() {
    const username = document.getElementById("username").value;
    if (!username) return alert("Enter username");

    localStorage.setItem("username", username);
    window.location.href = "interests.html";
}
</script>

</body>
</html>

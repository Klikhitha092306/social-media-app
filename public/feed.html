<!DOCTYPE html>
<html>
<head>
<title>Social App</title>
<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: white;
    height: 100vh;
    padding: 20px;
    box-shadow: 5px 0 15px rgba(0,0,0,0.05);
}

.sidebar h2 {
    margin-bottom: 40px;
}

.sidebar div {
    margin: 20px 0;
    cursor: pointer;
    font-weight: 500;
    font-size: 16px;
}

.sidebar div:hover {
    color: #dd2a7b;
}

/* Main */
.main {
    flex: 1;
    padding: 30px;
    display: flex;
    justify-content: center;
}

.feed-container {
    width: 650px;
}

/* Stories */
.stories {
    display: flex;
    overflow-x: auto;
    margin-bottom: 30px;
}

.story {
    text-align: center;
    margin-right: 15px;
}

.story img {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid #dd2a7b;
}

/* Post */
.post {
    background: white;
    padding: 18px;
    border-radius: 16px;
    margin-bottom: 30px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    transition: transform .2s ease, box-shadow .2s ease;
}

.post:hover {
    transform: translateY(-3px);
    box-shadow: 0 16px 34px rgba(0,0,0,0.12);
}

.post img {
    width: 100%;
    border-radius: 14px;
    margin-top: 10px;
    object-fit: cover;
    max-height: 420px;
}

.actions {
    margin-top: 10px;
}

.like {
    cursor: pointer;
    font-size: 20px;
}

textarea {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

button {
    margin-top: 10px;
    padding: 8px 20px;
    border-radius: 20px;
    border: none;
    background: #0095f6;
    color: white;
    cursor: pointer;
}
.post-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
}

.post-user {
    display: flex;
    align-items: center;
    gap: 10px;
}

.post-user img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
}

.section {
    display: none;
}

.active {
    display: block;
}

</style>
</head>
<body>

<div class="sidebar">
    <h2>MyApp</h2>
    <div onclick="showHome()">🏠 Home</div>
    <div onclick="showCreate()">➕ Create</div>
    <div onclick="showExplore()">📰 Explore</div>
</div>

<div class="main">
    <div class="feed-container">

        <!-- Stories -->
        <div class="stories">
            <div class="story">
                <img src="https://i.pravatar.cc/100?img=1">
                <p>User1</p>
            </div>
            <div class="story">
                <img src="https://i.pravatar.cc/100?img=2">
                <p>User2</p>
            </div>
            <div class="story">
                <img src="https://i.pravatar.cc/100?img=3">
                <p>User3</p>
            </div>
        </div>

        <!-- HOME -->
        <div id="homeSection" class="section active">
            <div id="homeFeed"></div>
        </div>

        <!-- CREATE -->
        <div id="createSection" class="section">
            <div class="post">
                <h3>Create Post</h3>
                <form id="postForm" enctype="multipart/form-data">
                    <textarea name="content" rows="3" placeholder="Share something..."></textarea>
                    <input type="file" name="image">
                    <button type="submit">Post</button>
                </form>
            </div>
        </div>

        <!-- EXPLORE -->
        <div id="exploreSection" class="section">
            <div id="exploreFeed"></div>
        </div>

    </div>
</div>

<script>

const username = localStorage.getItem("username");
if (!username) window.location.href = "index.html";

/* -------- POST HTML -------- */

function createPostHTML(post) {
    const isOwnPost = post.username === username;

    return `
        <div class="post">
            <div class="post-header">
                <div class="post-user">
                    <img src="/uploads/likhithaimage.jpg">
                    <strong>${post.username}</strong>
                </div>
                ${!isOwnPost ? `<button id="follow-${post.username}" onclick="toggleFollow('${post.username}', this)">Follow</button>` : ""}
            </div>

            <p>${post.content}</p>

            ${post.image ? `<img src="/uploads/${post.image}">` : ""}

            <div class="actions">
                <span class="like" onclick="toggleLike(${post.id}, this)">🤍</span>
                <span id="like-count-${post.id}">0</span> likes
            </div>
        </div>
    `;
}
            

/* -------- SECTION CONTROL -------- */

function setActive(sectionId) {
    document.querySelectorAll(".section").forEach(sec => {
        sec.classList.remove("active");
    });
    document.getElementById(sectionId).classList.add("active");
}

function showHome() {
    setActive("homeSection");
    loadHomeFeed();
}

function showCreate() {
    setActive("createSection");
}

function showExplore() {
    setActive("exploreSection");
    loadExploreFeed();
}

/* -------- LOAD FEEDS -------- */

function loadHomeFeed() 
{
    fetch(`/feed/${username}`)
    .then(res => res.json())
    .then(data => {

        document.getElementById("homeFeed").innerHTML =
            data.map(createPostHTML).join("");

        data.forEach(post => {
            loadLikeCount(post.id);
            checkFollowStatus(post.username);
        });

    });
}

function loadExploreFeed() 
{
    fetch(`/feed/${username}`)
    .then(res => res.json())
    .then(data => {

        document.getElementById("exploreFeed").innerHTML =
            data.map(createPostHTML).join("");

        data.forEach(post => {
            loadLikeCount(post.id);
            checkFollowStatus(post.username);
        });

    });
}
function toggleFollow(userToFollow, button) {
    fetch("/toggle-follow", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            follower: username,
            following: userToFollow
        })
    })
    .then(res => res.json())
    .then(data => {
        if (data.following) {
            button.innerText = "Following";
        } else {
            button.innerText = "Follow";
        }
    });
}

/* -------- LIKE SYSTEM -------- */

function toggleLike(postId, element) {
    fetch("/toggle-like", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            post_id: postId,
            username: username
        })
    })
    .then(res => res.json())
    .then(data => {
        element.innerText = data.liked ? "❤️" : "🤍";
        loadLikeCount(postId);
    });
}

function loadLikeCount(postId) {
    fetch(`/like-count/${postId}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById(`like-count-${postId}`).innerText = data.count;
    });
}

/* -------- CREATE POST -------- */

document.getElementById("postForm").addEventListener("submit", function(e){
    e.preventDefault();
    const formData = new FormData(this);
    formData.append("username", username);

    fetch("/create-post", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(() => {
        this.reset();
        showHome();
    });
});

/* -------- INITIAL LOAD -------- */

window.onload = showHome;
function checkFollowStatus(user) {
    fetch(`/is-following/${username}/${user}`)
    .then(res => res.json())
    .then(data => {
        const btn = document.getElementById(`follow-${user}`);
        if (btn && data.following) {
            btn.innerText = "Following";
        }
    });
}

</script>

</body>
</html>
